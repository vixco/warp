<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:; media-src 'self' blob: mediastream:;" />
  <title>Warp Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #000; overflow: hidden; cursor: none; }
    body.show-cursor { cursor: default; }

    /* Parsec-style local cursor: rendered client-side so it tracks the
       pointer with zero lag (the host cursor is suppressed in the stream).
       Shaped like the macOS arrow; the SVG tip sits at the element origin so
       translating it to (clientX, clientY) puts the hotspot under the pointer. */
    #localCursor {
      position: fixed; top: 0; left: 0;
      width: 22px; height: 22px;
      pointer-events: none; z-index: 50;
      transform: translate(-100px, -100px);
      will-change: transform;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.35));
    }
    #localCursor.hidden { display: none; }

    video {
      width: 100vw; height: 100vh;
      object-fit: contain;
      background: #000;
      display: block;
    }

    /* status / reconnect layer */
    .status {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px;
      color: #e7ecf4;
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      background: #10141c;
      z-index: 5;
    }
    .status.hidden { display: none; }
    .status .spinner {
      width: 34px; height: 34px;
      border: 3px solid #263042;
      border-top-color: #4f7cff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status .msg { font-size: 15px; color: #8b96a8; }
    .status button {
      background: #4f7cff; color: #fff; border: none;
      font: inherit; font-weight: 600;
      padding: 9px 20px; border-radius: 8px; cursor: pointer;
    }

    /* hover overlay pill */
    .overlay {
      position: fixed;
      top: 10px; left: 50%;
      transform: translate(-50%, -140%);
      display: flex; align-items: center; gap: 12px;
      background: rgba(16, 20, 28, 0.92);
      border: 1px solid #263042;
      border-radius: 999px;
      padding: 7px 16px;
      color: #e7ecf4;
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      font-size: 12.5px;
      transition: transform 0.18s ease;
      z-index: 10;
    }
    .overlay.pinned, .hotzone:hover + .overlay, .overlay:hover {
      transform: translate(-50%, 0);
    }
    .overlay .label { font-weight: 600; }
    .overlay .stats { color: #8b96a8; font-variant-numeric: tabular-nums; }
    .overlay button {
      background: transparent; border: none; color: #8b96a8;
      font: inherit; cursor: pointer; padding: 2px 6px;
    }
    .overlay button:hover { color: #fff; }
    .overlay .disconnect { color: #f87171; }
    .hotzone {
      position: fixed; top: 0; left: 25vw; width: 50vw; height: 14px;
      z-index: 9;
    }

    /* in-stream menu */
    .menu {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 360px;
      background: rgba(16, 20, 28, 0.97);
      border: 1px solid #263042;
      border-radius: 14px;
      padding: 22px;
      color: #e7ecf4;
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      font-size: 13.5px;
      z-index: 20;
      box-shadow: 0 20px 60px rgba(0,0,0,0.55);
    }
    .menu.hidden { display: none; }
    .menu-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .menu-stats { color: #8b96a8; font-size: 12px; margin-bottom: 16px;
                  font-variant-numeric: tabular-nums; }
    .menu-row { display: flex; align-items: center; justify-content: space-between;
                margin-bottom: 10px; }
    .menu-row label { color: #8b96a8; }
    .menu-row select {
      background: #0c1018; color: #e7ecf4;
      border: 1px solid #263042; border-radius: 7px;
      font: inherit; padding: 6px 10px; outline: none; min-width: 150px;
    }
    .menu-actions { display: flex; gap: 8px; margin-top: 16px; }
    .menu-actions button {
      flex: 1;
      background: #1e2634; color: #e7ecf4;
      border: 1px solid #263042; border-radius: 8px;
      font: inherit; font-weight: 600;
      padding: 8px 0; cursor: pointer;
    }
    .menu-actions button:hover { border-color: #4f7cff; }
    .menu-actions button.danger { background: #b91c1c; border-color: #b91c1c; }
    .menu-actions button.danger:hover { background: #dc2626; }
    .menu-hint { color: #566074; font-size: 11px; margin-top: 14px; text-align: center; }
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline></video>

  <div class="hotzone"></div>
  <div class="overlay" id="overlay">
    <span class="label" id="ovLabel">Warp</span>
    <span class="stats" id="ovStats">—</span>
    <button id="ovFullscreen" title="Toggle fullscreen (Ctrl+Shift+F)">⛶</button>
    <button class="disconnect" id="ovDisconnect" title="Disconnect (Ctrl+Shift+Q)">✕</button>
  </div>

  <!-- in-stream menu (Ctrl+Shift+M) -->
  <div class="menu hidden" id="menu">
    <div class="menu-title">⚡ <span id="menuLabel">Warp</span></div>
    <div class="menu-stats" id="menuStats">—</div>
    <div class="menu-row">
      <label>Max bitrate</label>
      <select id="menuBitrate">
        <option value="25">25 Mbps</option>
        <option value="50">50 Mbps</option>
        <option value="100">100 Mbps</option>
        <option value="150">150 Mbps</option>
        <option value="300">300 Mbps</option>
        <option value="400">400 Mbps</option>
        <option value="600">600 Mbps</option>
      </select>
    </div>
    <div class="menu-row">
      <label>Frame rate</label>
      <select id="menuFps">
        <option value="30">30 fps</option>
        <option value="60">60 fps</option>
      </select>
    </div>
    <div class="menu-row">
      <label>Picture</label>
      <select id="menuMode">
        <option value="sharp">Sharp text</option>
        <option value="smooth">Smooth motion</option>
      </select>
    </div>
    <div class="menu-row" id="rowSpeakers">
      <label>Speakers</label>
      <select id="menuSpeakers"></select>
    </div>
    <div class="menu-row" id="rowMic">
      <label>Microphone</label>
      <select id="menuMic"></select>
    </div>
    <div class="menu-actions">
      <button id="menuFullscreen">⛶ Fullscreen</button>
      <button id="menuResume">Resume</button>
      <button id="menuDisconnect" class="danger">Disconnect</button>
    </div>
    <div class="menu-hint">Ctrl+Shift+M menu · Ctrl+Shift+F fullscreen · Ctrl+Shift+Q disconnect</div>
  </div>

  <div class="status" id="status">
    <div class="spinner" id="statusSpinner"></div>
    <div class="msg" id="statusMsg">Connecting…</div>
    <button id="statusRetry" style="display:none">Reconnect</button>
  </div>

  <script type="module" src="viewer.js"></script>
</body>
</html>
