name: Release

# Every push to the main development branch builds installers for macOS and
# Windows and attaches them to a GitHub *draft* release. Only once both jobs
# have uploaded their artifacts (including latest.yml / latest-mac.yml) does the
# final `publish` job flip the draft to a public "Latest" release. This avoids
# the window where a release is public with only one platform's files, which
# made Windows clients 404 on latest.yml. Running Warp apps check the releases
# feed every 15 minutes and auto-update.

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write

env:
  # Monotonically increasing version so electron-updater always sees the
  # newest push as an upgrade.
  APP_VERSION: 0.1.${{ github.run_number }}

jobs:
  mac:
    runs-on: macos-latest
    # Secrets are surfaced as job-level env so steps can test them in `if:`
    # (the `secrets` context itself is not allowed in step `if` expressions).
    env:
      MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm version "$APP_VERSION" --no-git-tag-version
      - run: npm run build

      # Import the free self-signed code-signing cert (repo secrets) into a
      # dedicated keychain and TRUST it for code signing, so electron-builder's
      # `find-identity -v` discovers it and signs every build with the same
      # identity. That consistent signature is what lets Squirrel.Mac apply
      # auto-updates on macOS with no Apple Developer ID — the update's cert
      # matches the running app's designated requirement (leaf-hash based, so
      # clients need no trust in the cert). Skipped automatically if the
      # secrets aren't set (falls back to the ad-hoc seal).
      - name: Set up self-signed signing keychain
        id: signing
        if: ${{ env.MAC_CSC_LINK != '' }}
        run: |
          set -euo pipefail
          echo "$MAC_CSC_LINK" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          # Import the cert + private key into the SYSTEM keychain, and trust it
          # for code signing there — both via sudo, which is passwordless on the
          # runner and therefore non-interactive. (Trusting into a *user*
          # keychain triggers a GUI authorization prompt that never resolves on
          # headless CI, hanging the job — so we deliberately avoid that path.)
          SYS=/Library/Keychains/System.keychain
          sudo security import "$RUNNER_TEMP/cert.p12" -k "$SYS" \
            -P "$MAC_CSC_KEY_PASSWORD" -A -T /usr/bin/codesign
          openssl pkcs12 -in "$RUNNER_TEMP/cert.p12" -passin "pass:$MAC_CSC_KEY_PASSWORD" \
            -clcerts -nokeys -legacy -out "$RUNNER_TEMP/cert.pem" 2>/dev/null || \
          openssl pkcs12 -in "$RUNNER_TEMP/cert.p12" -passin "pass:$MAC_CSC_KEY_PASSWORD" \
            -clcerts -nokeys -out "$RUNNER_TEMP/cert.pem"
          sudo security add-trusted-cert -d -r trustRoot -p codeSign \
            -k "$SYS" "$RUNNER_TEMP/cert.pem"
          rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/cert.pem"
          echo "Discovered code-signing identities:"
          security find-identity -v -p codesigning
          echo "signed=1" >> "$GITHUB_OUTPUT"

      - name: Build & publish (signed if cert present)
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # With the trusted identity in the system keychain, electron-builder
          # auto-discovers and signs; WARP_SIGNED tells the ad-hoc hook to stand
          # aside. Both are empty when no cert secret is configured.
          WARP_SIGNED: ${{ steps.signing.outputs.signed }}

  windows:
    runs-on: windows-latest
    needs: mac   # sequential so mac creates the draft first and windows attaches to it
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm version "$env:APP_VERSION" --no-git-tag-version
      - run: npm run build:ts
      - run: npm run copy:assets
      - run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Flip the draft to a public "Latest" release only after both platforms have
  # uploaded their artifacts, so latest.yml is guaranteed present before any
  # client sees the release. Also stamp the macOS install note into the body:
  # without an Apple Developer ID the build is only ad-hoc signed, so macOS
  # Gatekeeper quarantines the browser download and shows "Warp is damaged"
  # until the user strips the quarantine flag once.
  publish:
    runs-on: ubuntu-latest
    needs: [mac, windows]
    steps:
      - name: Publish with install notes
        run: |
          gh release edit "v$APP_VERSION" --repo vixco/warp --draft=false --latest --notes '## Install

          ### macOS

          The build is ad-hoc signed (no Apple Developer ID), so macOS Gatekeeper quarantines the browser download and may show **“Warp is damaged”**. Clear the quarantine flag once **before** opening the dmg:

          ```sh
          xattr -cr ~/Downloads/Warp-*-arm64.dmg
          ```

          Then open the dmg, drag Warp to Applications, and launch.

          ### Windows

          Run the `Warp-Setup-*.exe` installer — it opens without a signature warning.'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
